
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadence</title>
    <link rel="manifest" href="./manifest.json" />
    <!-- Tailwind CSS is compiled at build time via PostCSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Fonts */
        --font-display: 'Outfit', sans-serif;
        --font-body: 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;

        /* Type Scale */
        --text-hero: 64px;
        --text-display: 48px;
        --text-title-1: 32px;
        --text-title-2: 24px;
        --text-title-3: 20px;
        --text-body-lg: 18px;
        --text-body: 16px;
        --text-body-sm: 14px;
        --text-caption: 12px;

        /* Spacing */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;
        --space-8: 64px;
        --space-9: 96px;
        --space-10: 128px;
        
        /* Time Themes Defaults */
        --ambient-tint: rgba(65, 148, 179, 0.02);
        --greeting-accent: #4194b3;
      }

      /* Time Aware Theming */
      body[data-time="morning"] {
        --ambient-tint: rgba(253, 243, 158, 0.03);
        --greeting-accent: #e9c56b;
      }
      body[data-time="afternoon"] {
        --ambient-tint: rgba(65, 148, 179, 0.02);
        --greeting-accent: #4194b3;
      }
      body[data-time="evening"] {
        --ambient-tint: rgba(138, 21, 56, 0.02);
        --greeting-accent: #8A1538;
      }
      body[data-time="night"] {
        --ambient-tint: rgba(81, 28, 60, 0.03);
        --greeting-accent: #511C3C;
      }
      
      body {
        font-family: var(--font-body);
        background-color: #FFFFFF;
        color: #000000;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        background-image: radial-gradient(ellipse at top right, var(--ambient-tint) 0%, transparent 50%);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Dark Mode Body */
      html.dark body,
      body.dark {
        background-color: #0a0a0a;
        color: #f5f5f5;
        background-image: radial-gradient(ellipse at top right, rgba(138, 21, 56, 0.05) 0%, transparent 50%);
      }
      
      html.dark .card,
      body.dark .card {
        background: #1a1a1a;
        border-color: rgba(255, 255, 255, 0.1);
      }
      
      html.dark .input,
      body.dark .input {
        background: #1a1a1a;
        color: #f5f5f5;
        border-color: rgba(255, 255, 255, 0.2);
      }
      
      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: var(--font-display);
      }
      
      [dir="rtl"] body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
      }

      /* Container Grid System (Step 4) */
      .container {
        --grid-columns: 12;
        --grid-gutter: 24px;
        --container-max: 1280px;
        
        display: grid;
        grid-template-columns: repeat(var(--grid-columns), 1fr);
        gap: var(--grid-gutter);
        max-width: var(--container-max);
        margin: 0 auto;
        padding: 0 var(--space-6);
        width: 100%;
      }

      @media (max-width: 1024px) {
        .container { --grid-columns: 8; }
      }

      @media (max-width: 640px) {
        .container {
          --grid-columns: 4;
          --grid-gutter: 16px;
          padding: 0 var(--space-4);
        }
      }

      /* Global Component Styles (Step 5) */
      
      /* Input Floating Labels */
      .input-group {
        position: relative;
        width: 100%;
      }
      
      .input {
        width: 100%;
        padding: 16px;
        padding-top: 24px; /* Space for floating label */
        font-size: 16px;
        color: #000000;
        background: #FFFFFF;
        border: 1.5px solid rgba(162, 148, 117, 0.4);
        border-radius: 4px;
        transition: all 200ms ease;
      }
      
      .input-label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        color: #A29475;
        pointer-events: none;
        transition: all 200ms ease;
      }
      
      .input:focus ~ .input-label,
      .input:not(:placeholder-shown) ~ .input-label {
        top: 12px;
        transform: translateY(0);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      
      .input:focus {
        outline: none;
        border-color: #8A1538;
        box-shadow: 0 0 0 3px rgba(138, 21, 56, 0.08);
      }
      
      [dir="rtl"] .input-label {
        left: auto;
        right: 16px;
      }

      /* Card Style */
      .card {
        position: relative;
        background: #FFFFFF;
        border: 1px solid rgba(162, 148, 117, 0.15);
        border-radius: 8px;
        padding: 24px;
        transition: all 200ms ease;
      }
      
      .card--interactive:hover {
        border-color: rgba(162, 148, 117, 0.3);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        transform: translateY(-2px);
      }
      
      .card--selected {
        border-color: #8A1538;
        border-width: 2px;
        background: rgba(138, 21, 56, 0.02);
      }

      /* Selection */
      ::selection {
        background: #8A1538; 
        color: white;
      }

      /* Scrollbar */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Accessibility Focus */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 1rem;
        z-index: 1000;
        background: #8A1538;
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        font-weight: bold;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 1rem;
      }

      kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.5em;
        padding: 0.1em 0.4em;
        font-family: var(--font-mono);
        font-size: 0.75em;
        font-weight: 500;
        line-height: 1;
        color: #4b5563;
        background-color: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 0.25em;
        box-shadow: 0 1px 0 0 #d1d5db;
        margin: 0 0.1em;
      }
      
      /* Screen Reader Only */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Cadence - Premium scheduling application for teams who value every moment. Experience the new standard in time management." />
</head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(registration) {
              console.log('ServiceWorker registered:', registration.scope);
            })
            .catch(function(error) {
              console.log('ServiceWorker registration failed:', error);
            });
        });
      }
      
      // Set time-of-day theme
      function setTimeTheme() {
        const hour = new Date().getHours();
        let timeOfDay;
        if (hour >= 5 && hour < 12) {
          timeOfDay = 'morning';
        } else if (hour >= 12 && hour < 17) {
          timeOfDay = 'afternoon';
        } else if (hour >= 17 && hour < 21) {
          timeOfDay = 'evening';
        } else {
          timeOfDay = 'night';
        }
        document.body.setAttribute('data-time', timeOfDay);
      }
      setTimeTheme();
      setInterval(setTimeTheme, 60000); // Update every minute
    </script>
  </body>
</html>
